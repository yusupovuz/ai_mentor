<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mentor Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #202123;
            --sidebar-text: #ececf1;
            --sidebar-hover: #2a2b32;
            --main-bg: #ffffff;
            --chat-bg: #f7f7f8;
            --primary-color: #10a37f;
            --primary-hover: #1a8f73;
            --text-main: #343541;
            --border-color: #e5e5e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            background-color: var(--main-bg);
            color: var(--text-main);
        }

        .hidden {
            display: none !important;
        }

        /* Auth sahifasi (Login / Register) */
        #auth-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f3f4f6;
        }

        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .auth-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
        }

        .auth-box button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-box button:hover {
            background-color: var(--primary-hover);
        }

        .toggle-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }

        .toggle-link span {
            color: var(--primary-color);
            font-weight: 500;
        }

        /* Asosiy Chat sahifasi */
        #app-container {
            width: 100%;
            display: flex;
            height: 100vh;
        }

        /* Sidebar (Yon panel) */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .new-chat-btn {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: transparent;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            transition: 0.2s;
        }

        .new-chat-btn:hover {
            background-color: var(--sidebar-hover);
        }

        .history-title {
            font-size: 12px;
            color: #8e8ea0;
            margin: 10px 5px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .history-list {
            flex-grow: 1;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: 0.2s;
        }

        .history-item:hover {
            background-color: var(--sidebar-hover);
        }

        .logout-btn {
            padding: 12px;
            margin-top: auto;
            border: none;
            border-radius: 6px;
            background-color: #dc3545;
            color: white;
            cursor: pointer;
        }

        /* Asosiy Chat qismi */
        .main-chat {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        .chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .message-row {
            padding: 20px;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
        }

        .message-row.ai {
            background-color: var(--chat-bg);
        }

        .message-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 20px;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .avatar.user {
            background-color: #5436da;
        }

        .avatar.ai {
            background-color: var(--primary-color);
        }

        .text {
            white-space: pre-wrap;
            line-height: 1.6;
            padding-top: 4px;
        }

        /* Kiritish maydoni (Input) */
        .input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 1) 30%);
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            background: white;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .input-wrapper input {
            flex-grow: 1;
            padding: 15px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .input-wrapper button {
            padding: 0 20px;
            background: transparent;
            border: none;
            color: var(--primary-color);
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .input-wrapper button:hover {
            background-color: var(--chat-bg);
        }
    </style>
</head>

<body>

    <div id="auth-container">
        <div id="login-box" class="auth-box">
            <h2>Tizimga kirish</h2>
            <p id="login-msg" style="color: red; font-size: 13px; text-align: center; margin-bottom: 10px;"></p>
            <input type="text" id="log-username" placeholder="Ismingiz (masalan: zafar)">
            <input type="password" id="log-password" placeholder="Parol">
            <button onclick="login()">Kirish</button>
            <div class="toggle-link" onclick="toggleAuth('register')">Akkauntingiz yo'qmi? <span>Ro'yxatdan
                    o'tish</span></div>
        </div>

        <div id="register-box" class="auth-box hidden">
            <h2>Ro'yxatdan o'tish</h2>
            <p id="reg-msg" style="color: red; font-size: 13px; text-align: center; margin-bottom: 10px;"></p>
            <input type="text" id="reg-username" placeholder="Yangi ism yarating">
            <input type="password" id="reg-password" placeholder="Parol yarating (maks. 72 belgi)">
            <button onclick="register()">Ro'yxatdan o'tish</button>
            <div class="toggle-link" onclick="toggleAuth('login')">Akkauntingiz bormi? <span>Kirish</span></div>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="startNewChat()">+ Yangi Chat</button>
            <div class="history-title">Suhbatlar tarixi</div>
            <div class="history-list" id="history-list">
            </div>
            <button class="logout-btn" onclick="logout()">Chiqish</button>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <span>AI Mentor Chat</span>
                <span id="user-display" style="color: #666; font-size: 14px;"></span>
            </div>

            <div class="chat-box" id="chat-box">
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Savolingizni yozing..."
                        onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button onclick="sendMessage()">Yuborish</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let jwtToken = localStorage.getItem("token");

        // Dastur yuklanganda tokenni tekshiramiz
        window.onload = () => {
            if (jwtToken) {
                document.getElementById("auth-container").classList.add("hidden");
                document.getElementById("app-container").classList.remove("hidden");
                loadHistory();
            }
        };

        // Auth oynalarini almashtirish
        function toggleAuth(type) {
            document.getElementById("login-msg").innerText = "";
            document.getElementById("reg-msg").innerText = "";
            if (type === 'register') {
                document.getElementById("login-box").classList.add("hidden");
                document.getElementById("register-box").classList.remove("hidden");
            } else {
                document.getElementById("register-box").classList.add("hidden");
                document.getElementById("login-box").classList.remove("hidden");
            }
        }

        // RO'YXATDAN O'TISH (Register)
        async function register() {
            const u = document.getElementById("reg-username").value;
            const p = document.getElementById("reg-password").value;
            const msgBox = document.getElementById("reg-msg");

            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: u, password: p })
            });

            if (res.ok) {
                msgBox.style.color = "green";
                msgBox.innerText = "Muvaffaqiyatli! Endi login qiling.";
                setTimeout(() => toggleAuth('login'), 1500);
            } else {
                const err = await res.json();
                msgBox.style.color = "red";
                msgBox.innerText = err.detail || "Xatolik yuz berdi";
            }
        }

        // TIZIMGA KIRISH (Login)
        async function login() {
            const u = document.getElementById("log-username").value;
            const p = document.getElementById("log-password").value;
            const msgBox = document.getElementById("login-msg");

            const formData = new URLSearchParams();
            formData.append("username", u);
            formData.append("password", p);

            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem("token", data.access_token);
                jwtToken = data.access_token;

                document.getElementById("auth-container").classList.add("hidden");
                document.getElementById("app-container").classList.remove("hidden");
                loadHistory();
            } else {
                msgBox.innerText = "Login yoki parol xato!";
            }
        }

        // TIZIMDAN CHIQISH
        function logout() {
            localStorage.removeItem("token");
            location.reload();
        }

        // YANGI CHAT (Ekranni tozalash)
        function startNewChat() {
            document.getElementById("chat-box").innerHTML = "";
        }

        // TARIXNI YUKLASH
        async function loadHistory() {
            if (!jwtToken) return;

            const res = await fetch("/history", {
                headers: { "Authorization": `Bearer ${jwtToken}` }
            });

            if (res.ok) {
                const data = await res.json();
                document.getElementById("user-display").innerText = "Foydalanuvchi: " + data.user;

                const historyList = document.getElementById("history-list");
                historyList.innerHTML = "";

                // Oxirgi xabarlar tepada turishi uchun teskari aylanamiz
                data.history.reverse().forEach(msg => {
                    const item = document.createElement("div");
                    item.className = "history-item";
                    // Savol uzun bo'lsa qirqib ko'rsatamiz
                    item.innerText = "💬 " + msg.user_question.substring(0, 25) + "...";
                    historyList.appendChild(item);
                });
            } else if (res.status === 401) {
                logout();
            }
        }

        // XABAR YUBORISH VA STREAMING
        async function sendMessage() {
            const input = document.getElementById("message-input");
            const text = input.value;
            if (!text) return;

            const chatBox = document.getElementById("chat-box");

            // Mijoz xabarini ekranga chizish
            chatBox.innerHTML += `
            <div class="message-row">
                <div class="message-content">
                    <div class="avatar user">S</div>
                    <div class="text">${text}</div>
                </div>
            </div>`;
            input.value = "";

            // AI xabari uchun bo'sh joy tayyorlash
            const aiRowId = "ai-" + Date.now();
            chatBox.innerHTML += `
            <div class="message-row ai">
                <div class="message-content">
                    <div class="avatar ai">AI</div>
                    <div class="text" id="${aiRowId}">...</div>
                </div>
            </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const aiTextElement = document.getElementById(aiRowId);
            aiTextElement.innerText = ""; // Uchta nuqtani olib tashlaymiz

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${jwtToken}`
                    },
                    body: JSON.stringify({ text: text })
                });

                if (response.status === 401) {
                    alert("Token eskirgan, qayta kiring.");
                    logout();
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    aiTextElement.innerText += chunk;
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                // Xabar yozib bo'lingach tarixni yangilab qo'yamiz
                loadHistory();

            } catch (e) {
                aiTextElement.innerText = "Xatolik yuz berdi. Server ishlayotganini tekshiring.";
            }
        }
    </script>
</body>

</html>
